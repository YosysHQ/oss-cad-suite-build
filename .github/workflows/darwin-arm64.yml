name: darwin-arm64

on:
  workflow_dispatch:
  workflow_run:
    workflows: [ darwin-x64 ]
    types:
      - completed

jobs:
  darwin-arm64-python3:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Cache sources
        uses: actions/cache/restore@v5
        with:
          key: cache-sources-python3
          path: _sources
      - name: Download previous build
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/bucket-darwin-arm64/darwin-arm64-python3.tgz"
          if wget --spider "${URL}" 2>/dev/null; then
              wget -qO- "${URL}" --retry-connrefused --read-timeout=20 --timeout=15 --retry-on-http-error=404 | tar xvfz -
          else
              echo "Previous version not found in bucket"
          fi
      - name: Download linux-x64-python3-native
        run: wget -qO- "https://github.com/${{ github.repository }}/releases/download/bucket-linux-x64/linux-x64-python3-native.tgz" --retry-connrefused --read-timeout=20 --timeout=15 --retry-on-http-error=404 | tar xvfz -
      - name: Build
        run: ./builder.py build --arch=darwin-arm64 --target=python3 --rules=default --single --tar
      - uses: ncipollo/release-action@v1
        if: hashFiles('darwin-arm64-python3.tgz') != ''
        with:
          allowUpdates: True
          prerelease: True
          omitBody: True
          omitBodyDuringUpdate: True
          omitNameDuringUpdate: True
          tag: bucket-darwin-arm64
          artifacts: "darwin-arm64-python3.tgz"
          token: ${{ secrets.GITHUB_TOKEN }}
